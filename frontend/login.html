<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIRA | Login</title>
  <link rel="icon" type="image/png" href="/research-repo/frontend/assets/umat_logo.png"/>
  <link rel="stylesheet" href="css/login.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="container">
  <div class="logo">
    <img src="/research-repo/frontend/assets/umat_logo.png" alt="UMaT Logo" style="width:56px; height:56px; object-fit:contain; margin-bottom:8px;"/>
    <h1>MIRA</h1>
    <p>Managing Intelligence in Research Academia</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login', event)">Login</div>
    <div class="tab" onclick="switchTab('register', event)">Register</div>
  </div>

  <!-- Login Form -->
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Email Address</label>
      <input class="input" type="email" id="loginEmail" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input class="input" type="password" id="loginPassword" placeholder="Enter your password" required />
        <button type="button" class="eye-btn" onclick="togglePassword('loginPassword', this)">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <button type="submit" class="submit-btn" id="loginBtn">Login</button>

    <div class="divider-text"><span>or</span></div>

    <div id="google-login-btn" class="google-btn-wrapper"></div>

    <div id="loginMsg"></div>
  </form>

  <!-- Register Form -->
  <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label>Full Name</label>
      <input class="input" type="text" id="regName" placeholder="John Doe" required />
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input class="input" type="email" id="regEmail" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input class="input" type="password" id="regPassword" placeholder="At least 6 characters" required />
        <button type="button" class="eye-btn" onclick="togglePassword('regPassword', this)">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select class="input" id="regRole">
        <option value="student">Student</option>
        <option value="lecturer">Lecturer</option>
      </select>
    </div>
    <button type="submit" class="submit-btn" id="registerBtn">Create Account</button>

    <div class="divider-text"><span>or</span></div>

    <div id="google-register-btn" class="google-btn-wrapper"></div>

    <div id="registerMsg"></div>
  </form>

  <div class="gold-bar"></div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
